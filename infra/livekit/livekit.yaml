# LiveKit dev-конфиг для Quorum (фаза 0 — заготовка, фактически используется с фазы 5)
# Документация: https://docs.livekit.io/home/self-hosting/deployment/

port: 7880
bind_addresses:
  - ''

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

redis:
  address: redis:6379

# DEV-ключи. В фазе 5 заменим на сгенерированные через `livekit-server generate-keys`
# и положим в env/Secrets.
keys:
  devkey: secret-please-change-in-phase-5

logging:
  level: info
