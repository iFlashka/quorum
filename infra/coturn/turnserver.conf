# coturn dev-конфиг для Quorum.
# Используется с фазы 4 (1-на-1 голос). REST-схема ephemeral creds: сервер
# Quorum выдаёт username=`<exp>:<userId>` + base64(HMAC-SHA1(secret, username)).
# Шаги при изменении секрета: апдейт TURN_SHARED_SECRET в apps/server/.env +
# `static-auth-secret` ниже + `pnpm infra:up` для рестарта контейнера.

listening-port=3478
fingerprint
lt-cred-mech
realm=quorum.local

# REST API для time-limited credentials. coturn принимает HMAC-SHA1 username.
use-auth-secret
static-auth-secret=dev_turn_shared_secret_change_me_____________________

# Диапазон UDP-портов для ICE
min-port=49152
max-port=65535

# Нет TLS на этой стадии — это локальный dev
no-tls
no-dtls

# Меньше шума в логах
no-multicast-peers
no-cli
