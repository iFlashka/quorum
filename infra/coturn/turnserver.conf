# coturn dev-конфиг для Quorum.
# В фазе 0 это «лишь бы поднялся» — реально используется с фазы 4 (1-на-1 голос).
# В проде задаются realm/static-auth-secret/external-ip через env, см. фазу 7.

listening-port=3478
fingerprint
lt-cred-mech
realm=quorum.local

# Dev-учётка (в проде заменим на time-limited credentials)
user=quorum:quorum_dev

# Диапазон UDP-портов для ICE
min-port=49152
max-port=65535

# Нет TLS на этой стадии — это локальный dev
no-tls
no-dtls

# Меньше шума в логах
no-multicast-peers
no-cli
