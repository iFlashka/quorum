# coturn prod-конфиг для Quorum.
# Запускается с network_mode: host чтобы видеть UDP-порты ICE напрямую.
#
# Перед использованием:
#   - заменить YOUR_SHARED_SECRET на значение из .env.prod::TURN_SHARED_SECRET
#   - заменить YOUR_PUBLIC_IP на реальный IP VPS (или раскомментить external-ip с DNS)
#   - открыть на VPS firewall: 3478/udp + 3478/tcp + 49152-65535/udp

listening-port=3478
fingerprint
lt-cred-mech
realm=quorum.local

# REST API ephemeral creds: HMAC-SHA1 username от сервера Quorum.
use-auth-secret
static-auth-secret=YOUR_SHARED_SECRET

# Внешний IP VPS — нужен чтобы клиенты получали правильный candidate.
# Если используешь cloud-провайдера с floating IP — пропиши его здесь.
external-ip=YOUR_PUBLIC_IP

# Диапазон UDP-портов для media-relay.
min-port=49152
max-port=65535

# Без TLS — Caddy не делает passthrough на UDP, но клиенты обычно используют
# нешифрованные SRTP / DTLS поверх. Если нужен TURN-TLS на 443 — настраивается
# отдельно с certfile/pkey-file (см. coturn doc).
no-tls
no-dtls

no-multicast-peers
no-cli
